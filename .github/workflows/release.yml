name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check release version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if ! [[ "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z"
            exit 1
          fi

          plugin_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json"))["version"])')"
          cli_version="$(go run ./cmd/agent-recall version)"

          test "$tag_version" = "$plugin_version"
          test "$tag_version" = "$cli_version"

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        run: VERSION="${GITHUB_REF_NAME#v}" scripts/build-release.sh

      - name: Validate release artifacts
        run: |
          tar -tzf dist/agent-recall-plugin-linux-amd64.tar.gz | grep 'agent-recall-plugin-linux-amd64/.claude-plugin/marketplace.json'
          tar -tzf dist/agent-recall-plugin-linux-amd64.tar.gz | grep 'agent-recall-plugin-linux-amd64/plugins/agent-recall/.claude-plugin/plugin.json'
          tar -tzf dist/agent-recall-plugin-linux-amd64.tar.gz | grep 'agent-recall-plugin-linux-amd64/plugins/agent-recall/bin/agent-recall'
          tar -tzf dist/agent-recall-plugin-windows-amd64.tar.gz | grep 'agent-recall-plugin-windows-amd64/plugins/agent-recall/bin/agent-recall.exe'
          tmpdir="$(mktemp -d)"
          tar -xzf dist/agent-recall-plugin-linux-amd64.tar.gz -C "$tmpdir"
          bin="$tmpdir/agent-recall-plugin-linux-amd64/plugins/agent-recall/bin/agent-recall"
          test "$("$bin" version)" = "${GITHUB_REF_NAME#v}"
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}\n{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}\n' | "$bin" mcp --store-dir "$tmpdir/store" | grep '"tools"'
          ! grep -R 'go run ./cmd/agent-recall' "$tmpdir/agent-recall-plugin-linux-amd64/plugins/agent-recall"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum agent-recall-plugin-*.tar.gz > checksums.txt
          sha256sum -c checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes

          gh release upload "$GITHUB_REF_NAME" \
            dist/agent-recall-plugin-*.tar.gz \
            dist/checksums.txt \
            --clobber
