name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Check version consistency
        run: |
          plugin_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json"))["version"])')"
          cli_version="$(go run ./cmd/agent-recall version)"
          test "$plugin_version" = "$cli_version"

      - name: Test
        run: go test ./...

      - name: Smoke test CLI and MCP
        run: |
          tmpdir=$(mktemp -d)
          go run ./cmd/agent-recall hook-sync --store-dir "$tmpdir" --strict < testdata/hooks/stop.json
          go run ./cmd/agent-recall status --store-dir "$tmpdir" --json | grep '"events"'
          go run ./cmd/agent-recall recall --store-dir "$tmpdir" --json auth | grep '"items"'
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}\n{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}\n' | go run ./cmd/agent-recall mcp --store-dir "$tmpdir" | grep '"tools"'

      - name: Build
        run: go build ./cmd/agent-recall

      - name: Build plugin artifact
        run: scripts/build-plugin.sh linux amd64

      - name: Validate plugin artifact
        run: |
          tar -tzf dist/agent-recall-plugin-linux-amd64.tar.gz | grep 'agent-recall-plugin-linux-amd64/.claude-plugin/marketplace.json'
          tar -tzf dist/agent-recall-plugin-linux-amd64.tar.gz | grep 'agent-recall-plugin-linux-amd64/plugins/agent-recall/.claude-plugin/plugin.json'
          tar -tzf dist/agent-recall-plugin-linux-amd64.tar.gz | grep 'agent-recall-plugin-linux-amd64/plugins/agent-recall/bin/agent-recall'
          tmpdir="$(mktemp -d)"
          tar -xzf dist/agent-recall-plugin-linux-amd64.tar.gz -C "$tmpdir"
          bin="$tmpdir/agent-recall-plugin-linux-amd64/plugins/agent-recall/bin/agent-recall"
          plugin_version="$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json"))["version"])')"
          test "$("$bin" version)" = "$plugin_version"
          grep '\${CLAUDE_PLUGIN_ROOT}/bin/agent-recall.*--strict' "$tmpdir/agent-recall-plugin-linux-amd64/plugins/agent-recall/hooks/hooks.json"
          env -i HOME="$HOME" AGENT_RECALL_HOME="$tmpdir/hook-store" CLAUDE_PLUGIN_ROOT="$tmpdir/agent-recall-plugin-linux-amd64/plugins/agent-recall" /bin/sh -c '"${CLAUDE_PLUGIN_ROOT}/bin/agent-recall" hook-sync --strict' < testdata/hooks/stop.json
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}\n{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}\n' | "$bin" mcp --store-dir "$tmpdir/store" | grep '"tools"'
          ! grep -R 'go run ./cmd/agent-recall' "$tmpdir/agent-recall-plugin-linux-amd64/plugins/agent-recall"
